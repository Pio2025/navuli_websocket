<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navuli Chat — Socket Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* —— LOGIN ———————————————————————————————————————————— */
#login-screen { width: 100%; max-width: 420px; padding: 16px; }

.login-card {
  background: white;
  border-radius: 14px;
  padding: 36px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10);
}

.login-card h1 { font-size: 22px; color: #111827; margin-bottom: 4px; }
.login-card .sub { color: #6b7280; font-size: 13px; margin-bottom: 28px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: #374151;
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 6px;
}
.form-group label span { font-weight: 400; color: #9ca3af; text-transform: none; letter-spacing: 0; }

.form-group input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
  color: #111827;
}
.form-group input:focus { border-color: #6366f1; }

.connect-btn {
  width: 100%;
  padding: 12px;
  background: #6366f1;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  margin-top: 4px;
}
.connect-btn:hover { background: #4f46e5; }
.connect-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

#login-error {
  margin-top: 12px;
  color: #ef4444;
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

/* —— CHAT ———————————————————————————————————————————— */
#chat-screen {
  display: none;
  width: 100vw;
  height: 100vh;
}

.chat-layout {
  display: flex;
  height: 100%;
}

/* Sidebar */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: white;
  border-right: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid #e5e7eb;
}
.sidebar-header h2 { font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .6px; }
.sidebar-header .room-tag {
  display: inline-block;
  margin-top: 6px;
  background: #ede9fe;
  color: #6366f1;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
}

.online-list { flex: 1; overflow-y: auto; padding: 10px 8px; }

.user-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: 8px;
}
.user-item:hover { background: #f9fafb; }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #6366f1;
  color: white;
  font-size: 13px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.avatar.green { background: #22c55e; }

.user-meta { flex: 1; min-width: 0; }
.user-name { font-size: 13px; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-you  { font-size: 10px; color: #9ca3af; }

.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {
  padding: 14px 20px;
  background: white;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-header h3 { font-size: 15px; color: #111827; }
#socket-status {
  margin-left: auto;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}
#socket-status.connected    { background: #dcfce7; color: #16a34a; }
#socket-status.disconnected { background: #fee2e2; color: #dc2626; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-row.mine  { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #6366f1;
  color: white;
  font-size: 11px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
}
.msg-row.mine .msg-avatar { background: #22c55e; }

.msg-body { display: flex; flex-direction: column; max-width: 62%; }
.msg-row.mine .msg-body { align-items: flex-end; }

.msg-name { font-size: 11px; color: #9ca3af; margin-bottom: 3px; }
.msg-row.mine .msg-name { text-align: right; }

.msg-bubble {
  padding: 9px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.45;
  word-break: break-word;
}
.msg-row:not(.mine) .msg-bubble {
  background: white;
  color: #111827;
  border-bottom-left-radius: 4px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.msg-row.mine .msg-bubble {
  background: #6366f1;
  color: white;
  border-bottom-right-radius: 4px;
}

.msg-time { font-size: 10px; color: #d1d5db; margin-top: 3px; }

.system-msg {
  text-align: center;
  font-size: 11px;
  color: #d1d5db;
  padding: 2px 0;
}

.typing-bar {
  height: 20px;
  padding: 0 20px;
  font-size: 12px;
  color: #9ca3af;
  font-style: italic;
}

.input-area {
  padding: 14px 20px;
  background: white;
  border-top: 1px solid #e5e7eb;
  display: flex;
  gap: 10px;
}
.input-area input {
  flex: 1;
  padding: 10px 16px;
  border: 1.5px solid #e5e7eb;
  border-radius: 24px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
.input-area input:focus { border-color: #6366f1; }

.send-btn {
  padding: 10px 22px;
  background: #6366f1;
  color: white;
  border: none;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.send-btn:hover { background: #4f46e5; }

@media (max-width: 560px) {
  .sidebar { width: 52px; }
  .sidebar-header h2,
  .sidebar-header .room-tag,
  .user-meta, .dot { display: none; }
  .online-list { padding: 8px 4px; }
  .user-item { justify-content: center; }
}
</style>
</head>
<body>

<!-- —— LOGIN SCREEN —— -->
<div id="login-screen">
  <div class="login-card">
    <h1>Navuli Chat</h1>
    <p class="sub">Socket.IO test client — connects directly to this server</p>

    <div class="form-group">
      <label>Username</label>
      <input id="inp-username" type="text" placeholder="e.g. Alice" autocomplete="off">
    </div>

    <div class="form-group">
      <label>User ID</label>
      <input id="inp-userid" type="number" placeholder="e.g. 1" min="1">
    </div>

    <div class="form-group">
      <label>Conversation ID</label>
      <input id="inp-conv" type="text" placeholder="e.g. 1" value="1" autocomplete="off">
    </div>

    <div class="form-group">
      <label>JWT Token <span>(optional — leave blank to auto-generate)</span></label>
      <input id="inp-token" type="text" placeholder="eyJ...">
    </div>

    <button class="connect-btn" id="connect-btn" onclick="connect()">Connect</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- —— CHAT SCREEN —— -->
<div id="chat-screen">
  <div class="chat-layout">

    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Online</h2>
        <span class="room-tag" id="room-tag">Room 1</span>
      </div>
      <div class="online-list" id="online-list"></div>
    </div>

    <div class="main">
      <div class="chat-header">
        <h3 id="chat-title">Room 1</h3>
        <span id="socket-status" class="disconnected">disconnected</span>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing-bar" id="typing-bar"></div>

      <div class="input-area">
        <input id="msg-input" type="text" placeholder="Type a message…" autocomplete="off"
               onkeydown="onInputKey(event)">
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket      = null;
let myUserId    = null;
let myUsername  = null;
let convId      = null;

const onlineUsers  = {};
const typingTimers = {};

// —— CONNECT ——————————————————————————————————————————————————————————————
async function connect() {
  const username = document.getElementById('inp-username').value.trim();
  const userId   = parseInt(document.getElementById('inp-userid').value, 10);
  convId         = document.getElementById('inp-conv').value.trim();
  let   token    = document.getElementById('inp-token').value.trim();
  const btn      = document.getElementById('connect-btn');
  const errEl    = document.getElementById('login-error');

  errEl.textContent = '';

  if (!username)            { errEl.textContent = 'Username is required.'; return; }
  if (!userId || userId < 1){ errEl.textContent = 'User ID must be a positive number.'; return; }
  if (!convId)              { errEl.textContent = 'Conversation ID is required.'; return; }

  btn.disabled    = true;
  btn.textContent = 'Connecting…';

  if (!token) {
    try {
      const res  = await fetch('/dev-token', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ userId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Token error');
      token = data.token;
    } catch (e) {
      errEl.textContent = 'Could not get token: ' + e.message;
      btn.disabled    = false;
      btn.textContent = 'Connect';
      return;
    }
  }

  myUserId   = userId;
  myUsername = username;

  socket = io({ auth: { token } });

  socket.on('connect', () => {
    setStatus(true);
    socket.emit('join_conversation', convId);
    setOnline(myUserId, myUsername);

    document.getElementById('chat-title').textContent = `Room ${convId}`;
    document.getElementById('room-tag').textContent   = `Room ${convId}`;

    showChat();
    btn.disabled    = false;
    btn.textContent = 'Connect';
  });

  socket.on('connect_error', (e) => {
    errEl.textContent = 'Connection failed: ' + e.message;
    btn.disabled    = false;
    btn.textContent = 'Connect';
    socket.disconnect();
    socket = null;
  });

  socket.on('disconnect', () => {
    setStatus(false);
    appendSystem('Disconnected from server');
  });

  socket.on('message_received', ({ message }) => {
    appendMessage(message, false);
  });

  socket.on('user_typing', ({ userId: uid, isTyping }) => {
    if (uid === myUserId) return;
    const name  = onlineUsers[uid]?.username || `User ${uid}`;
    const barEl = document.getElementById('typing-bar');
    clearTimeout(typingTimers[uid]);
    if (isTyping) {
      barEl.textContent = `${name} is typing…`;
      typingTimers[uid] = setTimeout(() => { barEl.textContent = ''; }, 3000);
    } else {
      barEl.textContent = '';
    }
  });

  socket.on('user_status', ({ userId: uid, status }) => {
    const name = onlineUsers[uid]?.username || `User ${uid}`;
    if (status === 'online') {
      setOnline(uid, name);
      appendSystem(`${name} joined`);
    } else {
      removeOnline(uid);
      appendSystem(`${name} left`);
    }
  });
}

// —— CHAT ACTIONS ——————————————————————————————————————————————————————————
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !socket?.connected) return;

  const message = {
    id:         Date.now(),
    sender_id:  myUserId,
    username:   myUsername,
    content:    text,
    text,
    created_at: new Date().toISOString(),
  };

  socket.emit('new_message', { conversationId: convId, message });
  socket.emit('typing', { conversationId: convId, isTyping: false });
  clearTimeout(window._selfTyping);
  appendMessage(message, true);
  input.value = '';
}

function onInputKey(e) {
  if (e.key === 'Enter') { sendMessage(); return; }
  if (!socket?.connected) return;
  socket.emit('typing', { conversationId: convId, isTyping: true });
  clearTimeout(window._selfTyping);
  window._selfTyping = setTimeout(() => {
    socket.emit('typing', { conversationId: convId, isTyping: false });
  }, 1500);
}

// —— DOM HELPERS ——————————————————————————————————————————————————————————
function showChat() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display  = 'block';
  document.getElementById('msg-input').focus();
}

function setStatus(connected) {
  const el = document.getElementById('socket-status');
  el.textContent = connected ? 'connected' : 'disconnected';
  el.className   = connected ? 'connected'  : 'disconnected';
}

function appendMessage(msg, isMine) {
  const wrap = document.getElementById('messages');
  const name = msg.username || `User ${msg.sender_id || msg.userId}`;
  const init = name[0].toUpperCase();
  const text = msg.content || msg.text || '';
  const time = new Date(msg.created_at || Date.now())
                 .toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  const row = document.createElement('div');
  row.className = 'msg-row' + (isMine ? ' mine' : '');
  row.innerHTML = `
    <div class="msg-avatar">${init}</div>
    <div class="msg-body">
      <div class="msg-name">${isMine ? 'You' : esc(name)}</div>
      <div class="msg-bubble">${esc(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  wrap.appendChild(row);
  wrap.scrollTop = wrap.scrollHeight;
}

function appendSystem(text) {
  const wrap = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className   = 'system-msg';
  el.textContent = text;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
}

function setOnline(uid, username) {
  onlineUsers[uid] = { username };
  renderSidebar();
}

function removeOnline(uid) {
  delete onlineUsers[uid];
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('online-list');
  list.innerHTML = '';
  Object.entries(onlineUsers).forEach(([uid, { username }]) => {
    const isMe  = Number(uid) === myUserId;
    const init  = username[0].toUpperCase();
    const div   = document.createElement('div');
    div.className = 'user-item';
    div.innerHTML = `
      <div class="avatar${isMe ? ' green' : ''}">${init}</div>
      <div class="user-meta">
        <div class="user-name">${esc(username)}</div>
        ${isMe ? '<div class="user-you">you</div>' : ''}
      </div>
      <div class="dot"></div>`;
    list.appendChild(div);
  });
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
